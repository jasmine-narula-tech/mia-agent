<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIA | Meeting Intelligence Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .spinner { border: 3px solid rgba(0, 0, 0, 0.1); border-left-color: #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 font-sans pb-20">

    <nav class="bg-white border-b sticky top-0 z-10 p-4 shadow-sm mb-8">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i data-lucide="bot"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">MIA <span class="text-blue-600">AI</span></h1>
            </div>
            <span class="text-xs font-medium px-2.5 py-0.5 rounded-full bg-green-100 text-green-800 border border-green-200">Online</span>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <i data-lucide="plus-circle" class="w-5 h-5 text-blue-500"></i> New Analysis
                    </h2>
                    <form id="analyzeForm" class="space-y-4">
                        <textarea id="transcriptText" name="transcript_text" rows="8" 
                            class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all text-sm"
                            placeholder="Paste your transcript here..."></textarea>

                        <div class="relative py-2">
                            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
                            <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-slate-400">or upload</span></div>
                        </div>

                        <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition">
                            <div class="flex flex-col items-center justify-center pt-5 pb-6 text-slate-500">
                                <i data-lucide="upload-cloud" class="w-8 h-8 mb-2"></i>
                                <p class="text-xs">TXT, PDF, or DOCX</p>
                            </div>
                            <input type="file" id="transcriptFile" name="transcript_file" class="hidden" />
                        </label>

                        <button type="submit" id="submitBtn"
                            class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all flex items-center justify-center gap-2">
                            <span>Analyze Now</span>
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div id="emptyState" class="bg-white rounded-2xl border border-dashed border-slate-300 p-20 text-center">
                    <i data-lucide="file-text" class="w-12 h-12 text-slate-300 mx-auto mb-4"></i>
                    <p class="text-slate-500">Waiting for a transcript to analyze...</p>
                </div>

                <div id="results" class="hidden space-y-6">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                        <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                            <i data-lucide="sparkles" class="text-yellow-500"></i> Executive Summary
                        </h2>
                        <p id="summary" class="text-slate-600 leading-relaxed"></p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-white rounded-2xl p-4 border border-slate-200">
                            <p class="text-slate-400 text-xs font-bold uppercase mb-1">Tone</p>
                            <span id="toneBadge" class="px-2 py-1 rounded text-sm font-bold bg-blue-100 text-blue-700"></span>
                        </div>
                        <div class="bg-white rounded-2xl p-4 border border-slate-200">
                            <p class="text-slate-400 text-xs font-bold uppercase mb-1">Productivity</p>
                            <div class="flex items-center gap-2">
                                <span id="productivityLabel" class="text-xl font-bold text-slate-800"></span>
                                <div class="w-full bg-slate-100 rounded-full h-2">
                                    <div id="productivityBar" class="bg-blue-500 h-2 rounded-full" style="width: 0%"></div>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white rounded-2xl p-4 border border-slate-200">
                            <p class="text-slate-400 text-xs font-bold uppercase mb-1">Engagement</p>
                            <div id="engagementTags" class="flex flex-wrap gap-1"></div>
                        </div>
                    </div>

                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="grid grid-cols-2 text-center border-b">
                            <button class="p-4 font-bold text-blue-600 border-b-2 border-blue-600">Action Items</button>
                            <button class="p-4 font-bold text-slate-400 hover:bg-slate-50">Decisions</button>
                        </div>
                        <div class="p-6">
                            <div id="actionItems" class="space-y-4"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
    lucide.createIcons();
    const form = document.getElementById('analyzeForm');
    const submitBtn = document.getElementById('submitBtn');

    form.onsubmit = async (e) => {
        e.preventDefault();
        
        // UI Loading State
        submitBtn.innerHTML = `<div class="spinner"></div><span>Processing...</span>`;
        submitBtn.disabled = true;

        const formData = new FormData(form);
        try {
            const response = await fetch('/analyze', { method: 'POST', body: formData });
            const data = await response.json();

            if (response.ok) {
                renderResults(data);
            } else {
                alert("Error: " + data.detail);
            }
        } catch (err) {
            alert("Connection Error: " + err.message);
        } finally {
            submitBtn.innerHTML = `<span>Analyze Now</span>`;
            submitBtn.disabled = false;
        }
    };

    function renderResults(data) {
        document.getElementById('emptyState').classList.add('hidden');
        document.getElementById('results').classList.remove('hidden');

        // Text data
        document.getElementById('summary').innerText = data.summary;
        document.getElementById('toneBadge').innerText = data.tone;
        document.getElementById('productivityLabel').innerText = `${data.productivity_score}/10`;
        document.getElementById('productivityBar').style.width = `${data.productivity_score * 10}%`;

        // Action Items Card
        const itemsContainer = document.getElementById('actionItems');
        itemsContainer.innerHTML = data.action_items.map(item => `
            <div class="flex items-start gap-4 p-4 rounded-xl bg-slate-50 border border-slate-100">
                <div class="bg-white p-2 rounded shadow-sm">
                    <i data-lucide="check-square" class="w-5 h-5 text-green-500"></i>
                </div>
                <div>
                    <p class="font-bold text-slate-800">${item.task}</p>
                    <div class="flex gap-4 mt-1 text-xs text-slate-500 font-medium">
                        <span class="flex items-center gap-1"><i data-lucide="user" class="w-3 h-3"></i> ${item.assigned_to}</span>
                        <span class="flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i> ${item.deadline || 'No Deadline'}</span>
                    </div>
                </div>
            </div>
        `).join('') + `
            <div class="mt-6">
                <h3 class="font-bold text-slate-800 mb-2 flex items-center gap-2"><i data-lucide="gavel" class="w-4 h-4"></i> Final Decisions</h3>
                <div class="flex flex-wrap gap-2">
                    ${data.decisions.map(d => `<span class="bg-purple-50 text-purple-700 px-3 py-1 rounded-full text-sm border border-purple-100 font-medium">${d}</span>`).join('')}
                </div>
            </div>
        `;

        // Engagement Tags
        const tags = document.getElementById('engagementTags');
        tags.innerHTML = Object.entries(data.engagement).map(([name, val]) => 
            `<span class="bg-slate-100 text-slate-700 px-2 py-1 rounded text-[10px] font-bold border border-slate-200">${name}: ${val}</span>`
        ).join('');

        lucide.createIcons();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    </script>
</body>
</html>
