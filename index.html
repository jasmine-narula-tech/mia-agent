<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIA | Intelligent Meeting Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .spinner { border: 3px solid rgba(0, 0, 0, 0.1); border-left-color: #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .tab-active { color: #2563eb; border-bottom: 2px solid #2563eb; }
        .tab-inactive { color: #94a3b8; border-bottom: 2px solid transparent; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 pb-20">

    <nav class="bg-white border-b sticky top-0 z-10 p-4 shadow-sm mb-8">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg text-white"><i data-lucide="bot"></i></div>
                <h1 class="text-xl font-bold tracking-tight">MIA <span class="text-blue-600">AI</span></h1>
            </div>
            <button onclick="resetApp()" class="text-xs font-bold text-slate-400 hover:text-red-500 transition-colors flex items-center gap-1">
                <i data-lucide="refresh-ccw" class="w-3 h-3"></i> RESET SYSTEM
            </button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                    <form id="analyzeForm" class="space-y-4">
                        <textarea id="transcriptText" name="transcript_text" rows="8" 
                            class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                            placeholder="Paste transcript here..."></textarea>

                        <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-slate-400">or upload</span></div>

                        <label class="flex flex-col items-center justify-center w-full p-4 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition">
                            <div id="fileUploadInfo" class="text-center">
                                <i data-lucide="upload-cloud" class="w-8 h-8 mx-auto mb-2 text-slate-400"></i>
                                <p id="fileNameDisplay" class="text-xs text-slate-500">Click to upload file</p>
                            </div>
                            <input type="file" id="transcriptFile" name="transcript_file" class="hidden" onchange="handleFileSelect(this)" />
                        </label>

                        <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition flex items-center justify-center gap-2">
                            <span>Analyze Now</span>
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div id="emptyState" class="bg-white rounded-2xl border border-dashed border-slate-300 p-20 text-center">
                    <i data-lucide="file-search" class="w-12 h-12 text-slate-300 mx-auto mb-4"></i>
                    <p class="text-slate-500">Analysis results will appear here</p>
                </div>

                <div id="results" class="hidden space-y-6">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                        <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i data-lucide="sparkles" class="text-yellow-500"></i> Summary</h2>
                        <p id="summary" class="text-slate-600 leading-relaxed"></p>
                    </div>

                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="flex border-b">
                            <button id="tabAction" onclick="switchTab('action')" class="flex-1 p-4 font-bold tab-active">Action Items</button>
                            <button id="tabDecision" onclick="switchTab('decision')" class="flex-1 p-4 font-bold tab-inactive">Decisions</button>
                        </div>
                        <div class="p-6">
                            <div id="actionContent" class="space-y-4"></div>
                            <div id="decisionContent" class="hidden space-y-4"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
    lucide.createIcons();
    
    // 1. Clear/Reset functionality
    function resetApp() {
        if(confirm("Clear current transcript and analysis?")) {
            document.getElementById('analyzeForm').reset();
            document.getElementById('fileNameDisplay').innerText = "Click to upload file";
            document.getElementById('results').classList.add('hidden');
            document.getElementById('emptyState').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    // 2. File Upload Feedback
    function handleFileSelect(input) {
        const fileName = input.files[0]?.name || "Click to upload file";
        const display = document.getElementById('fileNameDisplay');
        display.innerText = fileName;
        display.classList.add('text-blue-600', 'font-bold');
    }

    // 3. Tab Logic Fix
    function switchTab(type) {
        const actionBtn = document.getElementById('tabAction');
        const decisionBtn = document.getElementById('tabDecision');
        const actionBody = document.getElementById('actionContent');
        const decisionBody = document.getElementById('decisionContent');

        if(type === 'action') {
            actionBtn.className = 'flex-1 p-4 font-bold tab-active';
            decisionBtn.className = 'flex-1 p-4 font-bold tab-inactive';
            actionBody.classList.remove('hidden');
            decisionBody.classList.add('hidden');
        } else {
            decisionBtn.className = 'flex-1 p-4 font-bold tab-active';
            actionBtn.className = 'flex-1 p-4 font-bold tab-inactive';
            decisionBody.classList.remove('hidden');
            actionBody.classList.add('hidden');
        }
    }

    const form = document.getElementById('analyzeForm');
    form.onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerHTML = `<div class="spinner"></div><span>Analyzing...</span>`;
        btn.disabled = true;

        const formData = new FormData(form);
        try {
            const response = await fetch('/analyze', { method: 'POST', body: formData });
            const data = await response.json();

            if (response.ok) {
                document.getElementById('emptyState').classList.add('hidden');
                document.getElementById('results').classList.remove('hidden');
                document.getElementById('summary').innerText = data.summary;

                // Action Items
                document.getElementById('actionContent').innerHTML = data.action_items.map(i => `
                    <div class="p-4 bg-slate-50 rounded-xl border border-slate-100">
                        <p class="font-bold text-slate-800">${i.task}</p>
                        <p class="text-xs text-slate-500 italic mt-1">${i.assigned_to} • ${i.deadline || 'No deadline'}</p>
                    </div>
                `).join('');

                // Decisions
                document.getElementById('decisionContent').innerHTML = data.decisions.map(d => `
                    <div class="flex items-center gap-3 p-3 bg-purple-50 rounded-lg text-purple-700 font-medium border border-purple-100">
                        <i data-lucide="award" class="w-4 h-4"></i> ${d}
                    </div>
                `).join('') || "<p class='text-slate-400'>No major decisions recorded.</p>";

                lucide.createIcons();
                switchTab('action'); // Reset to first tab
            }
        } catch (err) { alert(err.message); }
        finally {
            btn.innerHTML = `<span>Analyze Now</span>`;
            btn.disabled = false;
        }
    };
    </script>
</body>
</html>
