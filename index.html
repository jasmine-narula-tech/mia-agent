<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIA - Meeting Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-2xl w-full bg-white rounded-xl shadow-lg p-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">MIA 🚀</h1>
        <p class="text-gray-500 mb-6">Upload a file or paste your meeting transcript below.</p>

        <form id="analyzeForm" class="space-y-4">
            <textarea id="transcriptText" name="transcript_text" rows="6" 
                class="w-full p-4 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                placeholder="Paste transcript here..."></textarea>

            <div class="flex items-center gap-4">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="text-gray-400 text-sm">OR</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <input type="file" id="transcriptFile" name="transcript_file" 
                class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">

            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
                Analyze Meeting
            </button>
        </form>

        <div id="results" class="mt-8 hidden space-y-4">
            <h2 class="text-xl font-bold text-gray-800">Analysis</h2>
            <div id="summary" class="p-4 bg-gray-50 rounded-lg italic"></div>
            <div id="items" class="space-y-2"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('analyzeForm');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Analyzing...";
            btn.disabled = true;

            const formData = new FormData(form);
            const response = await fetch('/analyze', { method: 'POST', body: formData });
            const data = await response.json();

            btn.innerText = "Analyze Meeting";
            btn.disabled = false;

            if (response.ok) {
                document.getElementById('results').classList.remove('hidden');
                document.getElementById('summary').innerText = data.summary;
                document.getElementById('items').innerHTML = `
                    <p><strong>Action Items:</strong> ${data.action_items.join(', ')}</p>
                    <p><strong>Decisions:</strong> ${data.decisions.join(', ')}</p>
                `;
            } else {
                alert("Error: " + data.detail);
            }
        };
    </script>
</body>
</html>
