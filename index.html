<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIA - Meeting Intelligence Agent</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl p-10">
        <h1 class="text-4xl font-extrabold text-gray-900 mb-3">MIA - Meeting Intelligent Assistant</h1>
        <p class="text-gray-500 mb-8">Paste your meeting transcript or upload a file to analyze insights, tone, and action items.</p>

        <form id="analyzeForm" class="space-y-6">
            <textarea id="transcriptText" name="transcript_text" rows="6"
                class="w-full p-5 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-gray-800 placeholder-gray-400 shadow-sm"
                placeholder="Paste transcript here..."></textarea>

            <div class="flex items-center gap-4 text-gray-400">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="text-sm font-medium">OR</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>

            <label for="transcriptFile" 
                   class="block w-full text-center cursor-pointer py-3 px-5 bg-blue-50 text-blue-700 font-semibold rounded-xl hover:bg-blue-100 transition shadow-sm">
                Upload Transcript File
            </label>
            <input type="file" id="transcriptFile" name="transcript_file" class="hidden">

            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition shadow-md">
                Analyze Meeting
            </button>
        </form>

        <div id="results" class="mt-10 hidden space-y-6">
            <h2 class="text-2xl font-bold text-gray-900">Meeting Analysis</h2>
            <div id="summary" class="p-6 bg-gray-50 rounded-xl italic shadow-inner text-gray-700"></div>

            <div id="metrics" class="flex flex-wrap gap-4">
                <div class="bg-blue-100 text-blue-800 px-4 py-2 rounded-full font-medium">Tone: <span id="tone"></span></div>
                <div class="bg-green-100 text-green-800 px-4 py-2 rounded-full font-medium">Productivity: <span id="productivity"></span></div>
                <div class="bg-yellow-100 text-yellow-800 px-4 py-2 rounded-full font-medium">Engagement: <span id="engagement"></span></div>
            </div>

            <div id="blockers" class="space-y-2">
                <strong class="text-gray-800">Blockers:</strong>
                <ul id="blockersList" class="list-disc list-inside text-gray-700"></ul>
            </div>

            <div id="items" class="space-y-4">
                <strong class="text-gray-800">Action Items & Decisions:</strong>
            </div>
        </div>
    </div>

<script>
const form = document.getElementById('analyzeForm');

form.onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');

    // Clear old results
    const resultsDiv = document.getElementById('results');
    const summaryDiv = document.getElementById('summary');
    const itemsDiv = document.getElementById('items');
    const blockersUl = document.getElementById('blockersList');
    summaryDiv.innerText = '';
    itemsDiv.innerHTML = '';
    blockersUl.innerHTML = '';
    document.getElementById('tone').innerText = '';
    document.getElementById('productivity').innerText = '';
    document.getElementById('engagement').innerText = '';
    resultsDiv.classList.add('hidden');

    btn.innerText = "Analyzing...";
    btn.disabled = true;

    const formData = new FormData(form);
    try {
        const response = await fetch('/analyze', { method: 'POST', body: formData });
        const data = await response.json();

        btn.innerText = "Analyze Meeting";
        btn.disabled = false;

        if (response.ok) {
            resultsDiv.classList.remove('hidden');

            summaryDiv.innerText = data.summary;
            document.getElementById("tone").innerText = data.tone;
            document.getElementById("productivity").innerText = data.productivity_score;
            document.getElementById("engagement").innerText = JSON.stringify(data.engagement);

            data.blockers.forEach(b => {
                const li = document.createElement("li");
                li.innerText = b;
                blockersUl.appendChild(li);
            });

            itemsDiv.innerHTML = data.action_items.map(a => 
                `<div class="p-3 bg-gray-50 rounded-xl shadow-inner">
                    • ${a.task} (Owner: ${a.assigned_to}, Deadline: ${a.deadline || "N/A"})
                </div>`
            ).join("");

            const decisionsDiv = document.createElement("div");
            decisionsDiv.className = "p-3 bg-gray-50 rounded-xl shadow-inner";
            decisionsDiv.innerHTML = `<strong>Decisions:</strong> ${data.decisions.join(', ')}`;
            itemsDiv.appendChild(decisionsDiv);

        } else {
            alert("Error: " + data.detail);
        }

    } catch (err) {
        btn.innerText = "Analyze Meeting";
        btn.disabled = false;
        alert("Error: " + err.message);
    }
};
</script>
</body>
</html>
