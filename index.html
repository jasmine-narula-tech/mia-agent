<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIA | AI Meeting Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .spinner { border: 3px solid rgba(255, 255, 255, 0.3); border-left-color: #fff; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .tab-active { color: #2563eb; border-bottom: 2px solid #2563eb; background: white; }
        .agent-terminal { background: #0f172a; color: #38bdf8; font-family: 'Courier New', Courier, monospace; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 pb-20">

    <nav class="bg-white border-b sticky top-0 z-10 p-4 shadow-sm mb-8">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg text-white"><i data-lucide="bot"></i></div>
                <div>
                    <h1 class="text-xl font-bold leading-none">MIA <span class="text-blue-600 text-sm">v2.6</span></h1>
                    <p class="text-[10px] text-slate-400 font-medium uppercase tracking-wider">Agentic Intelligence</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span id="sessionBadge" class="hidden text-[10px] bg-slate-100 px-2 py-1 rounded border font-mono"></span>
                <button onclick="resetApp()" class="text-slate-500 hover:text-red-500 flex items-center gap-1 text-sm font-medium transition">
                    <i data-lucide="refresh-ccw" class="w-4 h-4"></i> Reset
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white rounded-2xl shadow-sm border p-6">
                    <h2 class="text-sm font-bold text-slate-800 mb-4 flex items-center gap-2">
                        <i data-lucide="terminal" class="w-4 h-4"></i> AGENT INPUT
                    </h2>
                    <form id="analyzeForm" class="space-y-4">
                        <textarea id="transcriptText" name="transcript_text" rows="10" 
                            class="w-full p-4 bg-slate-50 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm transition-all"
                            placeholder="Paste meeting transcript..."></textarea>

                        <label id="dropzone" class="flex flex-col items-center justify-center w-full h-28 border-2 border-slate-200 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-blue-50 transition">
                            <div class="flex flex-col items-center justify-center py-4 text-slate-400" id="fileInfo">
                                <i data-lucide="file-text" class="w-6 h-6 mb-1"></i>
                                <p class="text-[10px] font-bold uppercase">Upload TXT</p>
                            </div>
                            <input type="file" id="transcriptFile" accept=".txt" name="transcript_file" class="hidden" onchange="handleFileSelect(this)" />
                        </label>

                        <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-100 transition flex items-center justify-center gap-3">
                            <span>RUN AGENT ANALYSIS</span>
                        </button>
                    </form>
                </div>

                <div id="agentLog" class="hidden bg-slate-900 rounded-2xl p-4 agent-terminal text-[11px] shadow-inner overflow-hidden">
                    <div class="flex justify-between items-center mb-2 border-b border-slate-700 pb-1">
                        <span class="text-slate-500 font-bold uppercase">Reasoning Trace</span>
                        <span class="animate-pulse">●</span>
                    </div>
                    <div id="logLines" class="space-y-1 h-32 overflow-y-auto custom-scrollbar"></div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div id="emptyState" class="bg-white rounded-2xl border-2 border-dashed h-full min-h-[400px] flex flex-col items-center justify-center text-center p-10">
                    <div class="bg-slate-100 p-4 rounded-full mb-4 text-slate-300">
                        <i data-lucide="brain-circuit" class="w-12 h-12"></i>
                    </div>
                    <h3 class="text-slate-800 font-bold">No Active Session</h3>
                    <p class="text-slate-400 text-sm max-w-xs">Upload a transcript to see MIA's intelligent extraction in real-time.</p>
                </div>

                <div id="results" class="hidden space-y-6">
                    <div class="bg-white rounded-2xl shadow-sm border p-6 relative">
                        <div class="flex justify-between items-start mb-4">
                            <h2 class="text-lg font-bold flex items-center gap-2"><i data-lucide="sparkles" class="text-amber-500"></i> Executive Summary</h2>
                            <button onclick="copySummary()" class="text-slate-400 hover:text-blue-600 transition p-1"><i data-lucide="copy" class="w-4 h-4"></i></button>
                        </div>
                        <p id="summary" class="text-slate-600 text-sm leading-relaxed italic border-l-4 border-blue-100 pl-4"></p>
                    </div>

                    <div class="grid grid-cols-3 gap-4">
                        <div class="bg-white p-4 rounded-2xl border shadow-sm">
                            <p class="text-[10px] uppercase font-black text-slate-400 mb-1">Sentiment</p>
                            <p id="tone" class="text-lg font-bold text-blue-600"></p>
                        </div>
                        <div class="bg-white p-4 rounded-2xl border shadow-sm">
                            <p class="text-[10px] uppercase font-black text-slate-400 mb-1">Efficiency</p>
                            <p id="productivity" class="text-lg font-bold text-slate-800"></p>
                        </div>
                        <div class="bg-white p-4 rounded-2xl border shadow-sm">
                            <p class="text-[10px] uppercase font-black text-slate-400 mb-1">Speaker Engagement</p>
                            <div id="engagement" class="text-[10px] font-medium text-slate-500 mt-1"></div>
                        </div>
                    </div>

                    <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
                        <div class="flex bg-slate-50 p-1">
                            <button onclick="switchTab('items')" id="btn-items" class="flex-1 py-3 text-xs font-bold rounded-2xl transition tab-active">ACTION ITEMS</button>
                            <button onclick="switchTab('decisions')" id="btn-decisions" class="flex-1 py-3 text-xs font-bold rounded-2xl transition text-slate-400">KEY DECISIONS</button>
                        </div>
                        <div class="p-6">
                            <div id="tab-items" class="space-y-3"></div>
                            <div id="tab-decisions" class="hidden space-y-3"></div>
                        </div>
                    </div>

                    <div id="blockersBox" class="bg-rose-50 border border-rose-100 rounded-2xl p-5 hidden">
                        <h3 class="text-rose-800 font-bold text-sm mb-3 flex items-center gap-2"><i data-lucide="shield-alert" class="w-4 h-4"></i> Identified Blockers</h3>
                        <ul id="blockersList" class="grid grid-cols-1 md:grid-cols-2 gap-2 text-rose-700 text-xs font-medium"></ul>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
    lucide.createIcons();

    function handleFileSelect(input) {
        const info = document.getElementById('fileInfo');
        const dropzone = document.getElementById('dropzone');
        if (input.files.length > 0) {
            info.innerHTML = `<i data-lucide="check-circle-2" class="w-6 h-6 mb-1 text-green-500"></i><p class="text-[10px] font-bold text-green-700">${input.files[0].name}</p>`;
            dropzone.classList.replace('border-slate-200', 'border-green-400');
            dropzone.classList.add('bg-green-50');
        }
        lucide.createIcons();
    }

    function resetApp() {
        localStorage.removeItem('mia_session');
        window.location.reload();
    }

    function addLog(msg) {
        const logLines = document.getElementById('logLines');
        const line = document.createElement('div');
        line.innerHTML = `<span class="opacity-40">[${new Date().toLocaleTimeString()}]</span> > ${msg}`;
        logLines.appendChild(line);
        logLines.scrollTop = logLines.scrollHeight;
    }

    function switchTab(type) {
        const isItems = type === 'items';
        document.getElementById('tab-items').classList.toggle('hidden', !isItems);
        document.getElementById('tab-decisions').classList.toggle('hidden', isItems);
        document.getElementById('btn-items').className = isItems ? 'flex-1 py-3 text-xs font-bold rounded-2xl transition tab-active' : 'flex-1 py-3 text-xs font-bold rounded-2xl transition text-slate-400';
        document.getElementById('btn-decisions').className = !isItems ? 'flex-1 py-3 text-xs font-bold rounded-2xl transition tab-active' : 'flex-1 py-3 text-xs font-bold rounded-2xl transition text-slate-400';
        lucide.createIcons();
    }

    document.getElementById('analyzeForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const log = document.getElementById('agentLog');
        
        btn.innerHTML = `<div class="spinner"></div><span>INITIALIZING AGENT...</span>`;
        btn.disabled = true;
        log.classList.remove('hidden');
        document.getElementById('logLines').innerHTML = "";
        
        addLog("Initializing ADK Runner...");
        addLog("Loading context & instructions...");

        const formData = new FormData(e.target);
        const session = localStorage.getItem('mia_session') || `SES_${Math.random().toString(36).substr(2, 9)}`;
        formData.append('session_id', session);
        localStorage.setItem('mia_session', session);

        try {
            addLog("Executing Reasoning Loop...");
            const response = await fetch('/analyze', { method: 'POST', body: formData });
            const data = await response.json();
            
            if (response.ok) {
                addLog("Finalizing JSON Payload...");
                render(data, session);
            } else {
                addLog(`ERROR: ${data.detail}`);
            }
        } catch (err) { addLog(`CRITICAL ERROR: ${err.message}`); }
        finally { btn.innerHTML = `<span>RUN AGENT ANALYSIS</span>`; btn.disabled = false; }
    };

    function render(data, session) {
        document.getElementById('emptyState').classList.add('hidden');
        document.getElementById('results').classList.remove('hidden');
        document.getElementById('sessionBadge').innerText = session;
        document.getElementById('sessionBadge').classList.remove('hidden');
        
        document.getElementById('summary').innerText = data.summary;
        document.getElementById('tone').innerText = data.tone;
        document.getElementById('productivity').innerText = `${data.productivity_score}/10`;
        
        document.getElementById('engagement').innerHTML = Object.entries(data.engagement)
            .map(([name, val]) => `<div class="flex justify-between border-b border-slate-50 py-1"><span>${name}</span><span class="font-bold">${val}</span></div>`).join('');

        const bBox = document.getElementById('blockersBox');
        if (data.blockers?.length) {
            bBox.classList.remove('hidden');
            document.getElementById('blockersList').innerHTML = data.blockers.map(b => `<li class="flex items-center gap-2"><i data-lucide="dot" class="w-4 h-4 text-rose-400"></i> ${b}</li>`).join('');
        }

        document.getElementById('tab-items').innerHTML = data.action_items.map(a => `
            <div class="p-4 bg-white rounded-xl border border-slate-100 shadow-sm flex gap-4 items-center">
                <div class="bg-blue-50 p-2 rounded-lg text-blue-600"><i data-lucide="check-circle" class="w-4 h-4"></i></div>
                <div>
                    <div class="text-sm font-bold text-slate-800">${a.task}</div>
                    <div class="flex gap-3 mt-1 font-bold text-[9px] uppercase tracking-wider text-slate-400">
                        <span><i data-lucide="user" class="inline w-3 h-3"></i> ${a.assigned_to}</span>
                        <span><i data-lucide="calendar" class="inline w-3 h-3"></i> ${a.deadline || 'NO DATE'}</span>
                    </div>
                </div>
            </div>
        `).join('');

        document.getElementById('tab-decisions').innerHTML = data.decisions.map(d => `
            <div class="flex items-center gap-3 text-xs font-semibold text-slate-700 p-3 bg-indigo-50/50 rounded-xl border border-indigo-100">
                <i data-lucide="gavel" class="w-4 h-4 text-indigo-500"></i> <span>${d}</span>
            </div>
        `).join('');

        lucide.createIcons();
        switchTab('items');
        addLog("Analysis Complete. Idle.");
    }

    function copySummary() {
        const text = document.getElementById('summary').innerText;
        navigator.clipboard.writeText(text);
        alert("Summary copied to clipboard!");
    }
    </script>
</body>
</html>
