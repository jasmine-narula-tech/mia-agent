<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIA - Meeting Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-3xl w-full bg-white rounded-xl shadow-lg p-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">MIA - Meeting Intelligent Assistant</h1>
        <p class="text-gray-500 mb-6">Upload a file or paste your meeting transcript below.</p>

        <form id="analyzeForm" class="space-y-4">
            <textarea id="transcriptText" name="transcript_text" rows="6" 
                class="w-full p-4 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                placeholder="Paste transcript here..."></textarea>

            <div class="flex items-center gap-4">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="text-gray-400 text-sm">OR</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <input type="file" id="transcriptFile" name="transcript_file" 
                class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">

            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
                Analyze Meeting
            </button>
        </form>

        <div id="results" class="mt-8 hidden space-y-4">
            <h2 class="text-xl font-bold text-gray-800">Meeting Analysis</h2>
            <div id="summary" class="p-4 bg-gray-50 rounded-lg italic"></div>

            <div id="metrics" class="space-y-2">
                <p><strong>Tone:</strong> <span id="tone"></span></p>
                <p><strong>Productivity Score:</strong> <span id="productivity"></span></p>
                <p><strong>Engagement:</strong> <span id="engagement"></span></p>
            </div>

            <div id="blockers" class="space-y-2">
                <strong>Blockers:</strong>
                <ul id="blockersList"></ul>
            </div>

            <div id="items" class="space-y-2"></div>
        </div>
    </div>

    <script>
    const form = document.getElementById('analyzeForm');

    form.onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');

        // Clear old results
        const resultsDiv = document.getElementById('results');
        const summaryDiv = document.getElementById('summary');
        const itemsDiv = document.getElementById('items');
        const blockersUl = document.getElementById('blockersList');
        summaryDiv.innerText = '';
        itemsDiv.innerHTML = '';
        blockersUl.innerHTML = '';
        document.getElementById('tone').innerText = '';
        document.getElementById('productivity').innerText = '';
        document.getElementById('engagement').innerText = '';
        resultsDiv.classList.add('hidden');

        btn.innerText = "Analyzing...";
        btn.disabled = true;

        const formData = new FormData(form);
        try {
            const response = await fetch('/analyze', { method: 'POST', body: formData });
            const data = await response.json();

            btn.innerText = "Analyze Meeting";
            btn.disabled = false;

            if (response.ok) {
                resultsDiv.classList.remove('hidden');

                // Summary
                summaryDiv.innerText = data.summary;

                // Metrics
                document.getElementById("tone").innerText = data.tone;
                document.getElementById("productivity").innerText = data.productivity_score;
                document.getElementById("engagement").innerText = JSON.stringify(data.engagement);

                // Blockers
                data.blockers.forEach(b => {
                    const li = document.createElement("li");
                    li.innerText = b;
                    blockersUl.appendChild(li);
                });

                // Action Items
                itemsDiv.innerHTML = data.action_items.map(a => 
                    `<p>• ${a.task} (Owner: ${a.assigned_to}, Deadline: ${a.deadline || "N/A"})</p>`
                ).join("");

                // Decisions
                const decisionsDiv = document.createElement("div");
                decisionsDiv.innerHTML = `<p><strong>Decisions:</strong> ${data.decisions.join(', ')}</p>`;
                itemsDiv.appendChild(decisionsDiv);

            } else {
                alert("Error: " + data.detail);
            }

        } catch (err) {
            btn.innerText = "Analyze Meeting";
            btn.disabled = false;
            alert("Error: " + err.message);
        }
    };
    </script>
</body>
</html>
