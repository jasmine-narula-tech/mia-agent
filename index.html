<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIA | Intelligent Meeting Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .spinner { border: 3px solid rgba(0, 0, 0, 0.1); border-left-color: #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .tab-active { color: #2563eb; border-bottom: 2px solid #2563eb; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 pb-20">

    <nav class="bg-white border-b sticky top-0 z-10 p-4 shadow-sm mb-8">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg text-white"><i data-lucide="bot"></i></div>
                <h1 class="text-xl font-bold">MIA <span class="text-blue-600">AI</span></h1>
            </div>
            <button onclick="resetApp()" class="text-slate-500 hover:text-red-500 flex items-center gap-1 text-sm font-medium transition">
                <i data-lucide="refresh-ccw" class="w-4 h-4"></i> Reset
            </button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white rounded-2xl shadow-sm border p-6">
                    <form id="analyzeForm" class="space-y-4">
                        <textarea id="transcriptText" name="transcript_text" rows="8" 
                            class="w-full p-4 bg-slate-50 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                            placeholder="Paste transcript here..."></textarea>

                        <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-slate-400">or</span></div>

                        <label id="dropzone" class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-blue-50 hover:border-blue-400 transition">
                            <div class="flex flex-col items-center justify-center py-4 text-slate-500" id="fileInfo">
                                <i data-lucide="file-up" class="w-8 h-8 mb-2"></i>
                                <p class="text-xs font-medium">Click to upload file</p>
                            </div>
                            <input type="file" id="transcriptFile" accept=".txt" name="transcript_file" class="hidden" onchange="handleFileSelect(this)" />
                        </label>

                        <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition flex items-center justify-center gap-2">
                            <span>Analyze</span>
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div id="emptyState" class="bg-white rounded-2xl border border-dashed p-20 text-center">
                    <i data-lucide="layers" class="w-12 h-12 text-slate-200 mx-auto mb-4"></i>
                    <p class="text-slate-400">Your analysis will appear here</p>
                </div>

                <div id="results" class="hidden space-y-6">
                    <div class="bg-white rounded-2xl shadow-sm border p-6">
                        <h2 class="text-lg font-bold mb-3 flex items-center gap-2"><i data-lucide="text-quote" class="text-blue-500"></i> Summary</h2>
                        <p id="summary" class="text-slate-600 text-sm leading-relaxed"></p>
                    </div>

                    <div class="grid grid-cols-3 gap-4">
                        <div class="bg-white p-4 rounded-2xl border text-center">
                            <p class="text-[10px] uppercase font-bold text-slate-400">Tone</p>
                            <p id="tone" class="font-bold text-blue-600"></p>
                        </div>
                        <div class="bg-white p-4 rounded-2xl border text-center">
                            <p class="text-[10px] uppercase font-bold text-slate-400">Productivity</p>
                            <p id="productivity" class="font-bold text-slate-800"></p>
                        </div>
                        <div class="bg-white p-4 rounded-2xl border text-center">
                            <p class="text-[10px] uppercase font-bold text-slate-400">Engagement</p>
                            <div id="engagement" class="text-[10px] font-medium text-slate-500 mt-1"></div>
                        </div>
                    </div>

                    <div id="blockersBox" class="bg-red-50 border border-red-100 rounded-2xl p-5 hidden">
                        <h3 class="text-red-800 font-bold text-sm mb-2 flex items-center gap-2"><i data-lucide="alert-circle" class="w-4 h-4"></i> Critical Blockers</h3>
                        <ul id="blockersList" class="text-red-700 text-xs list-disc pl-5 space-y-1"></ul>
                    </div>

                    <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                        <div class="flex border-b bg-slate-50">
                            <button onclick="switchTab('items')" id="btn-items" class="flex-1 p-4 text-sm font-bold tab-active">Action Items</button>
                            <button onclick="switchTab('decisions')" id="btn-decisions" class="flex-1 p-4 text-sm font-bold text-slate-400">Decisions</button>
                        </div>
                        <div class="p-6">
                            <div id="tab-items" class="space-y-3"></div>
                            <div id="tab-decisions" class="hidden space-y-2"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
    lucide.createIcons();

    function handleFileSelect(input) {
        const info = document.getElementById('fileInfo');
        const dropzone = document.getElementById('dropzone');
        if (input.files.length > 0) {
            const fileName = input.files[0].name;
            info.innerHTML = `<i data-lucide="check-circle" class="w-8 h-8 mb-2 text-green-500"></i><p class="text-xs font-bold text-green-700">${fileName}</p>`;
            dropzone.classList.add('border-green-400', 'bg-green-50');
        }
        lucide.createIcons();
    }

    function resetApp() {
        document.getElementById('analyzeForm').reset();
        document.getElementById('fileInfo').innerHTML = `<i data-lucide="file-up" class="w-8 h-8 mb-2"></i><p class="text-xs font-medium">Click to upload file</p>`;
        document.getElementById('dropzone').className = "flex flex-col items-center justify-center w-full h-32 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-blue-50 hover:border-blue-400 transition";
        document.getElementById('results').classList.add('hidden');
        document.getElementById('emptyState').classList.remove('hidden');
        lucide.createIcons();
    }

    function switchTab(type) {
        const isItems = type === 'items';
        document.getElementById('tab-items').classList.toggle('hidden', !isItems);
        document.getElementById('tab-decisions').classList.toggle('hidden', isItems);
        document.getElementById('btn-items').className = isItems ? 'flex-1 p-4 text-sm font-bold tab-active' : 'flex-1 p-4 text-sm font-bold text-slate-400';
        document.getElementById('btn-decisions').className = !isItems ? 'flex-1 p-4 text-sm font-bold tab-active' : 'flex-1 p-4 text-sm font-bold text-slate-400';
    }

    document.getElementById('analyzeForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerHTML = `<div class="spinner mr-2"></div><span>Analyzing...</span>`;
        btn.disabled = true;

        const formData = new FormData(e.target);
        try {
            const response = await fetch('/analyze', { method: 'POST', body: formData });
            const data = await response.json();
            if (response.ok) render(data);
            else alert(data.detail);
        } catch (err) { alert(err.message); }
        finally { btn.innerHTML = `<span>Analyze</span>`; btn.disabled = false; }
    };

    function render(data) {
        document.getElementById('emptyState').classList.add('hidden');
        document.getElementById('results').classList.remove('hidden');
        
        document.getElementById('summary').innerText = data.summary;
        document.getElementById('tone').innerText = data.tone;
        document.getElementById('productivity').innerText = `${data.productivity_score}/10`;
        
        // Engagement
        document.getElementById('engagement').innerHTML = Object.entries(data.engagement)
            .map(([name, val]) => `<div>${name}: ${val}</div>`).join('');

        // Blockers
        const bBox = document.getElementById('blockersBox');
        if (data.blockers?.length) {
            bBox.classList.remove('hidden');
            document.getElementById('blockersList').innerHTML = data.blockers.map(b => `<li>${b}</li>`).join('');
        } else bBox.classList.add('hidden');

        // Action Items
        document.getElementById('tab-items').innerHTML = data.action_items.map(a => `
            <div class="p-3 bg-slate-50 rounded-lg border text-xs">
                <div class="font-bold text-slate-800">${a.task}</div>
                <div class="text-slate-500 mt-1 uppercase text-[10px]">Owner: ${a.assigned_to} | Due: ${a.deadline || 'N/A'}</div>
            </div>
        `).join('');

        // Decisions
        document.getElementById('tab-decisions').innerHTML = data.decisions.map(d => `
            <div class="flex items-center gap-2 text-sm text-slate-700 p-2 bg-purple-50 rounded-lg border border-purple-100">
                <i data-lucide="check-circle-2" class="w-4 h-4 text-purple-500"></i> <span>${d}</span>
            </div>
        `).join('');

        lucide.createIcons();
        switchTab('items');
    }
    </script>
</body>
</html>
