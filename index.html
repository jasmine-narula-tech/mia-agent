<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIA | ADK Agentic Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .spinner { border: 3px solid rgba(255, 255, 255, 0.3); border-left-color: #fff; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .tab-active { color: #2563eb; border-bottom: 2px solid #2563eb; background: white; }
        .agent-terminal { background: #0f172a; color: #38bdf8; font-family: 'Courier New', Courier, monospace; line-height: 1.6; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 pb-20">

    <nav class="bg-white border-b sticky top-0 z-50 p-4 shadow-sm mb-8">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg text-white"><i data-lucide="bot"></i></div>
                <div>
                    <h1 class="text-xl font-bold leading-none">MIA <span class="text-blue-600 text-xs font-mono">ADK-RUNNER</span></h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Agent Development Kit v1.2</p>
                </div>
            </div>
            <button onclick="resetApp()" class="text-slate-400 hover:text-red-500 flex items-center gap-1 text-xs font-bold transition">
                <i data-lucide="refresh-cw" class="w-3 h-3"></i> PURGE SESSION
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white rounded-2xl shadow-sm border p-6">
                    <form id="analyzeForm" class="space-y-4">
                        <div class="flex justify-between items-center mb-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase">Transcript Input</label>
                            <span id="charCount" class="text-[10px] text-slate-300 font-mono">0 chars</span>
                        </div>
                        <textarea id="transcriptText" name="transcript_text" rows="10" 
                            class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm transition-all placeholder:text-slate-300"
                            placeholder="Paste meeting transcript here..." oninput="updateCount()"></textarea>

                        <div class="relative flex justify-center text-[10px] uppercase font-bold text-slate-300 py-2">
                            <span class="bg-white px-3 relative z-10">or upload source</span>
                            <div class="absolute top-1/2 left-0 w-full h-[1px] bg-slate-100"></div>
                        </div>

                        <label id="dropzone" class="flex flex-col items-center justify-center w-full h-24 border-2 border-slate-200 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-blue-50 transition-colors">
                            <div class="flex flex-col items-center justify-center text-slate-400" id="fileInfo">
                                <i data-lucide="file-text" class="w-5 h-5 mb-1"></i>
                                <p class="text-[10px] font-bold">ATTACH .TXT FILE</p>
                            </div>
                            <input type="file" id="transcriptFile" accept=".txt" name="transcript_file" class="hidden" onchange="handleFileSelect(this)" />
                        </label>

                        <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-black shadow-xl shadow-slate-200 transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
                            <span>EXECUTE RUNNER</span>
                        </button>
                    </form>
                </div>

                <div id="agentLog" class="hidden bg-slate-950 rounded-2xl p-5 agent-terminal shadow-2xl border border-slate-800">
                    <div class="flex justify-between items-center mb-3 border-b border-slate-800 pb-2">
                        <span class="text-[10px] font-black text-blue-400 tracking-tighter">ADK_REASONING_ENGINE</span>
                        <div class="flex gap-1">
                            <div class="w-1.5 h-1.5 rounded-full bg-red-500/50"></div>
                            <div class="w-1.5 h-1.5 rounded-full bg-amber-500/50"></div>
                            <div class="w-1.5 h-1.5 rounded-full bg-green-500/50 animate-pulse"></div>
                        </div>
                    </div>
                    <div id="logLines" class="space-y-2 h-48 overflow-y-auto custom-scrollbar text-[10px]"></div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div id="emptyState" class="bg-white rounded-3xl border border-slate-200 h-full min-h-[500px] flex flex-col items-center justify-center text-center p-12">
                    <div class="w-20 h-20 bg-blue-50 text-blue-500 rounded-3xl flex items-center justify-center mb-6 rotate-3">
                        <i data-lucide="zap" class="w-10 h-10 fill-current"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800 mb-2">Ready for Analysis</h3>
                    <p class="text-slate-400 text-sm max-w-sm leading-relaxed">MIA uses the 2026 Agent Development Kit to process your meetings with human-like reasoning.</p>
                </div>

                <div id="results" class="hidden space-y-6">
                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1.5 h-full bg-blue-500"></div>
                        <div class="flex justify-between items-start mb-6">
                            <h2 class="text-xl font-bold flex items-center gap-3"><i data-lucide="file-search" class="text-blue-500 w-5 h-5"></i> Analysis Overview</h2>
                            <button onclick="copySummary()" class="bg-slate-50 text-slate-400 hover:text-blue-600 p-2 rounded-lg transition-colors border">
                                <i data-lucide="copy" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <p id="summary" class="text-slate-600 text-base leading-relaxed font-medium"></p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                            <div class="flex items-center gap-2 mb-3">
                                <i data-lucide="smile" class="w-4 h-4 text-blue-400"></i>
                                <span class="text-[10px] font-black text-slate-400 uppercase">Meeting Tone</span>
                            </div>
                            <p id="tone" class="text-xl font-bold text-slate-800"></p>
                        </div>
                        <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                            <div class="flex items-center gap-2 mb-3">
                                <i data-lucide="trending-up" class="w-4 h-4 text-emerald-400"></i>
                                <span class="text-[10px] font-black text-slate-400 uppercase">Productivity</span>
                            </div>
                            <p id="productivity" class="text-xl font-bold text-slate-800"></p>
                        </div>
                        <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                            <div class="flex items-center gap-2 mb-3">
                                <i data-lucide="users" class="w-4 h-4 text-indigo-400"></i>
                                <span class="text-[10px] font-black text-slate-400 uppercase">Engagement</span>
                            </div>
                            <div id="engagement" class="space-y-2 mt-2"></div>
                        </div>
                    </div>

                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="flex bg-slate-50/50 p-2 border-b border-slate-100">
                            <button onclick="switchTab('items')" id="btn-items" class="flex-1 py-4 text-xs font-black rounded-2xl transition tab-active uppercase tracking-widest">Tasks</button>
                            <button onclick="switchTab('decisions')" id="btn-decisions" class="flex-1 py-4 text-xs font-black rounded-2xl transition text-slate-400 uppercase tracking-widest">Decisions</button>
                        </div>
                        <div class="p-8">
                            <div id="tab-items" class="space-y-4"></div>
                            <div id="tab-decisions" class="hidden space-y-4"></div>
                        </div>
                    </div>

                    <div id="blockersBox" class="bg-red-50/50 border border-red-100 rounded-3xl p-8 hidden">
                        <h3 class="text-red-800 font-bold text-sm mb-4 flex items-center gap-2">
                            <i data-lucide="alert-triangle" class="w-4 h-4"></i> Critical Blockers & Risks
                        </h3>
                        <ul id="blockersList" class="grid grid-cols-1 md:grid-cols-2 gap-4 text-red-700 text-xs font-semibold"></ul>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
    lucide.createIcons();

    function updateCount() {
        const text = document.getElementById('transcriptText').value;
        document.getElementById('charCount').innerText = `${text.length} chars`;
    }

    function handleFileSelect(input) {
        const info = document.getElementById('fileInfo');
        if (input.files.length > 0) {
            info.innerHTML = `<i data-lucide="file-check" class="w-5 h-5 mb-1 text-emerald-500"></i><p class="text-[10px] font-bold text-emerald-600">${input.files[0].name}</p>`;
        }
        lucide.createIcons();
    }

    function resetApp() {
        localStorage.removeItem('mia_session');
        window.location.reload();
    }

    function addLog(msg, color = 'text-blue-400') {
        const logLines = document.getElementById('logLines');
        const line = document.createElement('div');
        line.className = 'flex gap-2';
        line.innerHTML = `<span class="opacity-30 flex-shrink-0">${new Date().toLocaleTimeString([], {hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit'})}</span> <span class="${color}">$ ${msg}</span>`;
        logLines.appendChild(line);
        logLines.scrollTop = logLines.scrollHeight;
    }

    function switchTab(type) {
        const isItems = type === 'items';
        document.getElementById('tab-items').classList.toggle('hidden', !isItems);
        document.getElementById('tab-decisions').classList.toggle('hidden', isItems);
        document.getElementById('btn-items').className = isItems ? 'flex-1 py-4 text-xs font-black rounded-2xl transition tab-active uppercase tracking-widest' : 'flex-1 py-4 text-xs font-black rounded-2xl transition text-slate-400 uppercase tracking-widest';
        document.getElementById('btn-decisions').className = !isItems ? 'flex-1 py-4 text-xs font-black rounded-2xl transition tab-active uppercase tracking-widest' : 'flex-1 py-4 text-xs font-black rounded-2xl transition text-slate-400 uppercase tracking-widest';
        lucide.createIcons();
    }

    document.getElementById('analyzeForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const log = document.getElementById('agentLog');
        
        btn.innerHTML = `<div class="spinner"></div>`;
        btn.disabled = true;
        log.classList.remove('hidden');
        document.getElementById('logLines').innerHTML = "";
        
        addLog("SYSTEM: Attaching ADK Runner...");
        addLog("SESSION: Building context window...");

        const formData = new FormData(e.target);
        const session = localStorage.getItem('mia_session') || `ADK-${Math.random().toString(36).substr(2, 5).toUpperCase()}`;
        formData.append('session_id', session);
        localStorage.setItem('mia_session', session);

        try {
            addLog(`ENGINE: Executing reasoning loop for ${session}...`, 'text-amber-400');
            const response = await fetch('/analyze', { method: 'POST', body: formData });
            const data = await response.json();
            
            if (response.ok) {
                addLog("ENGINE: Logic finalized. Rendering UI...", 'text-emerald-400');
                render(data);
            } else {
                addLog(`CRITICAL: ${data.detail}`, 'text-red-500');
            }
        } catch (err) { addLog(`FETCH_ERR: ${err.message}`, 'text-red-500'); }
        finally { btn.innerHTML = `<span>EXECUTE RUNNER</span>`; btn.disabled = false; }
    };

    function render(data) {
        document.getElementById('emptyState').classList.add('hidden');
        document.getElementById('results').classList.remove('hidden');
        
        document.getElementById('summary').innerText = data.summary;
        document.getElementById('tone').innerText = data.tone;
        document.getElementById('productivity').innerText = `${data.productivity_score}/10`;
        
        document.getElementById('engagement').innerHTML = Object.entries(data.engagement)
            .map(([name, val]) => `
                <div class="flex justify-between items-center text-[11px] font-bold">
                    <span class="text-slate-500">${name}</span>
                    <span class="bg-slate-100 px-2 py-0.5 rounded text-blue-600">${val}</span>
                </div>
            `).join('');

        const bBox = document.getElementById('blockersBox');
        if (data.blockers?.length) {
            bBox.classList.remove('hidden');
            document.getElementById('blockersList').innerHTML = data.blockers.map(b => `
                <li class="flex items-start gap-3 bg-white p-3 rounded-xl border border-red-100">
                    <i data-lucide="shield-x" class="w-4 h-4 text-red-400 flex-shrink-0"></i> ${b}
                </li>`).join('');
        } else bBox.classList.add('hidden');

        document.getElementById('tab-items').innerHTML = data.action_items.map(a => `
            <div class="p-5 bg-slate-50/50 rounded-2xl border border-slate-100 flex gap-5 items-center group hover:bg-white hover:shadow-md transition-all">
                <div class="bg-blue-500 text-white p-3 rounded-2xl"><i data-lucide="check" class="w-5 h-5"></i></div>
                <div>
                    <div class="text-sm font-black text-slate-800">${a.task}</div>
                    <div class="flex gap-4 mt-2 font-bold text-[10px] uppercase tracking-tighter text-slate-400">
                        <span class="flex items-center gap-1"><i data-lucide="user-plus" class="w-3 h-3"></i> ${a.assigned_to}</span>
                        <span class="flex items-center gap-1"><i data-lucide="clock" class="w-3 h-3"></i> ${a.deadline || 'Pending'}</span>
                    </div>
                </div>
            </div>
        `).join('');

        document.getElementById('tab-decisions').innerHTML = data.decisions.map(d => `
            <div class="flex items-center gap-4 text-xs font-bold text-slate-700 p-4 bg-indigo-50/30 rounded-2xl border border-indigo-100">
                <div class="w-2 h-2 rounded-full bg-indigo-500"></div> <span>${d}</span>
            </div>
        `).join('');

        lucide.createIcons();
        switchTab('items');
    }

    function copySummary() {
        const text = document.getElementById('summary').innerText;
        navigator.clipboard.writeText(text);
        addLog("UI: Summary copied to clipboard.", "text-indigo-400");
    }
    </script>
</body>
</html>
